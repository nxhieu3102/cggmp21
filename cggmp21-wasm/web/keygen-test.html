<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGGMP21 Keygen WASM Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 4px;
      background-color: #f9f9f9;
    }
    .loading {
      color: #666;
      font-style: italic;
    }
    .log {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f5f5f5;
      font-family: monospace;
      white-space: pre-wrap;
      height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CGGMP21 Keygen WASM Test</h1>
    
    <div class="result" id="result">
      <p class="loading">Running keygen test...</p>
    </div>
    
    <h2>Console Log</h2>
    <div class="log" id="log"></div>
  </div>

  <script>
    // Redirect console.log to our log div
    (function() {
      const consoleLog = console.log;
      const consoleError = console.error;
      const logElement = document.getElementById('log');
      
      console.log = function() {
        const args = Array.from(arguments);
        const message = args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' ');
        
        logElement.textContent += message + '\n';
        logElement.scrollTop = logElement.scrollHeight;
        consoleLog.apply(console, arguments);
      };
      
      console.error = function() {
        const args = Array.from(arguments);
        const message = args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' ');
        
        const errorElement = document.createElement('span');
        errorElement.style.color = 'red';
        errorElement.textContent = message + '\n';
        
        logElement.appendChild(errorElement);
        logElement.scrollTop = logElement.scrollHeight;
        consoleError.apply(console, arguments);
      };
    })();
  </script>
  
  <script type="module" src="keygen-test.js"></script>
</body>
</html>
