<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchical CGGMP21 - Interactive Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #ff6b6b;
            color: white;
        }

        .reset-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .progress-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .progress-bar-wrapper {
            background: #e0e0e0;
            border-radius: 20px;
            height: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 20px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .progress-text {
            color: white;
            font-weight: bold;
            font-size: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Party Grid */
        .party-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .party-grid {
                grid-template-columns: 1fr;
            }
        }

        .party-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .party-box.selected {
            border: 3px solid #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .party-box.signing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
            50% { box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4); }
            100% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        }

        .party-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .party-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .party-rank {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .rank-0 {
            background: linear-gradient(135deg, #667eea, #5a67d8);
        }

        .rank-1 {
            background: linear-gradient(135deg, #764ba2, #6b4299);
        }

        .party-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            margin-left: 10px;
        }

        .party-status.ready {
            background: #4CAF50;
            animation: blink 1s infinite;
        }

        .party-status.busy {
            background: #ff9800;
            animation: spin 1s linear infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .party-log {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .party-log::-webkit-scrollbar {
            width: 8px;
        }

        .party-log::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .party-log::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .party-log::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .log-entry.success {
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
        }

        .log-entry.error {
            background: rgba(244, 67, 54, 0.1);
            color: #c62828;
        }

        .log-entry.info {
            background: rgba(33, 150, 243, 0.1);
            color: #1565c0;
        }

        .sign-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .sign-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .sign-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .sign-btn.selected {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }

        /* Global Output */
        .global-output {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .output-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .global-log {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .global-log::-webkit-scrollbar {
            width: 8px;
        }

        .global-log::-webkit-scrollbar-track {
            background: #2e2e2e;
            border-radius: 4px;
        }

        .global-log::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .global-log::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        /* Signature Result */
        .signature-result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            display: none;
        }

        .signature-result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signature-result h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .signature-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #4CAF50;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        /* Stats Display */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="title">🔐 Hierarchical Threshold CGGMP21 Demo</h1>
            <p class="subtitle">3-of-4 Threshold Signature with Ranks [0, 0, 1, 1]</p>
            
            <!-- Control Panel -->
            <div class="control-panel">
                <button id="generateBtn" class="control-btn generate-btn">
                    🔑 Generate Key Shares
                </button>
                <button id="resetBtn" class="control-btn reset-btn">
                    🔄 Reset Demo
                </button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-label" id="progressLabel">Ready to start...</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar" id="progressBar" style="width: 0%">
                    <span class="progress-text" id="progressText">0%</span>
                </div>
            </div>
        </div>

        <!-- Party Grid -->
        <div class="party-grid" id="partyGrid">
            <!-- Party 0 -->
            <div class="party-box" id="party0">
                <div class="party-header">
                    <span class="party-title">Party 0</span>
                    <div>
                        <span class="party-rank rank-0">Rank 0</span>
                        <span class="party-status" id="status0"></span>
                    </div>
                </div>
                <div class="party-log" id="log0"></div>
                <button class="sign-btn" id="signBtn0" disabled>
                    ✍️ Sign Message
                </button>
            </div>

            <!-- Party 1 -->
            <div class="party-box" id="party1">
                <div class="party-header">
                    <span class="party-title">Party 1</span>
                    <div>
                        <span class="party-rank rank-0">Rank 0</span>
                        <span class="party-status" id="status1"></span>
                    </div>
                </div>
                <div class="party-log" id="log1"></div>
                <button class="sign-btn" id="signBtn1" disabled>
                    ✍️ Sign Message
                </button>
            </div>

            <!-- Party 2 -->
            <div class="party-box" id="party2">
                <div class="party-header">
                    <span class="party-title">Party 2</span>
                    <div>
                        <span class="party-rank rank-1">Rank 1</span>
                        <span class="party-status" id="status2"></span>
                    </div>
                </div>
                <div class="party-log" id="log2"></div>
                <button class="sign-btn" id="signBtn2" disabled>
                    ✍️ Sign Message
                </button>
            </div>

            <!-- Party 3 -->
            <div class="party-box" id="party3">
                <div class="party-header">
                    <span class="party-title">Party 3</span>
                    <div>
                        <span class="party-rank rank-1">Rank 1</span>
                        <span class="party-status" id="status3"></span>
                    </div>
                </div>
                <div class="party-log" id="log3"></div>
                <button class="sign-btn" id="signBtn3" disabled>
                    ✍️ Sign Message
                </button>
            </div>
        </div>

        <!-- Global Output -->
        <div class="global-output">
            <h2 class="output-title">📊 Global Protocol Output</h2>
            <div class="global-log" id="globalLog"></div>
            
            <!-- Signature Result -->
            <div class="signature-result" id="signatureResult">
                <h3>✅ Signature Generated Successfully!</h3>
                <div class="signature-value" id="signatureValue"></div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Signing Time</div>
                        <div class="stat-value" id="signingTime">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total Time</div>
                        <div class="stat-value" id="totalTime">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Signers</div>
                        <div class="stat-value" id="signersCount">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load the main script -->
    <script type="module" src="./test_hierarchical_demo.js"></script>
</body>
</html>
